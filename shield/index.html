<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>STC Shield</title>
  <link rel="stylesheet" href="/css/shield.css" />
</head>

<body>

<!-- 🔥 MINIMAL NAV (STRICT RULE APPLIED) -->
<header class="nav">
  <div class="nav-inner">
    <strong>Cloudflare Compliance</strong>

    <nav>
      <a href="/riskdna/">RiskDNA</a>
      <a href="/copilot/">Copilot</a>
      <a href="/copilot/">Copilot</a>   
 </nav>
  </div>
</header>

<!-- 🔥 MAIN CONTAINER -->
<main class="container">

  <section class="consolebar">
    <div>
      <h1>Shield Console</h1>
      <p class="muted">Identity attack-path visibility</p>
    </div>
  </section>

  <section class="console-layout">

    <!-- LEFT -->
    <aside class="card">
      <h3>Findings</h3>
      <ul id="findings-list">
        <li data-id="f1" data-risk="72">⚠️ Privileged role escalation</li>
        <li data-id="f2" data-risk="65">⚠️ Cross-account trust chain</li>
        <li data-id="f3" data-risk="43">⚠️ Suspicious refund path</li>
      </ul>
    </aside>

    <!-- CENTER -->
    <section class="card">
      <h3>Main Canvas</h3>
      <p class="muted">Graph / table will render here</p>
    </section>

    <!-- RIGHT -->
    <aside class="card">
      <h3>Context</h3>
      <div id="context-panel">
        <p class="muted">Select a finding to inspect risk</p>
      </div>
    </aside>

  </section>

</main>

<script>
const findings = document.querySelectorAll("#findings-list li");

findings.forEach(item => {
  item.addEventListener("click", () => {

    const id = item.dataset.id;
    const risk = item.dataset.risk;

    // store selected finding
    localStorage.setItem("selectedFinding", JSON.stringify({
      id,
      risk
    }));

    // redirect to RiskDNA
    window.location.href = "/riskdna/";
  });
});
</script>

</body>
</html>
