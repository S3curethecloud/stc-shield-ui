<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>STC Copilot</title>
  <link rel="stylesheet" href="/css/shield.css" />
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <strong>STC Copilot</strong>

    <nav>
      <a href="/shield/">Shield</a>
      <a href="/riskdna/">RiskDNA</a>
    </nav>
  </div>
</header>

<main class="container">

  <h1>Copilot Intelligence</h1>
  <p class="muted">Deterministic explanation of runtime decisions</p>

  <div class="card" id="copilot-output">
    <p class="muted">Analyzing decision...</p>
  </div>

</main>

<script>
async function runCopilot() {
  const container = document.getElementById("copilot-output");
  const data = JSON.parse(localStorage.getItem("lastDecision"));

  if (!data) {
    container.innerHTML = "<p>No decision data available</p>";
    return;
  }

  try {
    const res = await fetch("https://stc-intelligence-core.fly.dev/copilot/bridge/controlplane", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: "Explain this decision",
        context: data,
        mode: "copilot",
        source: "shield"
      })
    });

    const result = await res.json();

    container.innerHTML = `
      <h3>Copilot Response</h3>
      <p><strong>Explanation:</strong> ${result.explanation || "No explanation"}</p>

      <div style="margin-top:10px;">
        <strong>Result:</strong>
        <pre>${JSON.stringify(result.result, null, 2)}</pre>
      </div>

      <div style="margin-top:10px;">
        <strong>Source:</strong> ${result.source || "unknown"}
      </div>

      <div style="margin-top:10px;">
        <strong>Citations:</strong> ${(result.citations || []).join(", ")}
      </div>

      ${
        result.revocation_flag
          ? `<div style="margin-top:10px;"><strong>Revocation Action:</strong><pre>${JSON.stringify(result.revocation_action, null, 2)}</pre></div>`
          : ""
      }
    `;

  } catch (err) {
    container.innerHTML = `<p>Error: ${err.message}</p>`;
  }
}

runCopilot();
</script>

</body>
</html>
