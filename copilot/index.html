<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>STC Copilot</title>
  <link rel="stylesheet" href="/css/shield.css" />
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <strong>STC Copilot</strong>

    <nav>
      <a href="/shield/">Shield</a>
      <a href="/riskdna/">RiskDNA</a>
    </nav>
  </div>
</header>

<main class="container">

  <h1>Copilot Intelligence</h1>
  <p class="muted">Deterministic explanation of runtime decisions</p>

  <div class="card" id="copilot-output">
    <p class="muted">Analyzing decision...</p>
  </div>

</main>

<script>

function computeRiskDNA(finding) {
  let score = 0;
  let signals = [];

  if (finding.title?.toLowerCase().includes("privilege")) {
    score += 40;
    signals.push("privilege_escalation");
  }

  if (finding.title?.toLowerCase().includes("cross-account")) {
    score += 30;
    signals.push("cross_account_trust");
  }

  if (finding.title?.toLowerCase().includes("refund")) {
    score += 20;
    signals.push("financial_anomaly");
  }

  if (finding.severity === "CRITICAL") score += 30;
  if (finding.severity === "HIGH") score += 20;

  score = Math.min(score, 100);

  return {
    score,
    signals,
    confidence: "DETERMINISTIC"
  };
}

async function runCopilot() {
  const container = document.getElementById("copilot-output");

  const finding = JSON.parse(localStorage.getItem("lastDecision"));

  if (!finding) {
    container.innerHTML = "<p>No decision data available</p>";
    return;
  }

  const risk = computeRiskDNA(finding);

  const data = {
    ...finding,
    risk_score: risk.score,
    signals: risk.signals
  };

  try {
    const res = await fetch("https://stc-intelligence-core.fly.dev/copilot/bridge/controlplane", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: "Explain this decision",
        context: data,
        mode: "copilot",
        source: "shield"
      })
    });

    const result = await res.json();

    if (result.graph_context && result.graph_context["controlplane.v1"]) {
      localStorage.setItem(
        "shieldGraph",
        JSON.stringify(result.graph_context["controlplane.v1"])
      );
    }

    container.innerHTML = `
      <h3>Copilot Response</h3>
      <p><strong>Explanation:</strong> ${result.explanation || "No explanation"}</p>

      <div style="margin-top:10px;">
        <strong>Result:</strong>
        <pre>${JSON.stringify(result.result, null, 2)}</pre>
      </div>

      <div style="margin-top:10px;">
        <strong>Source:</strong> ${result.source || "unknown"}
      </div>

      <div style="margin-top:10px;">
        <strong>Citations:</strong> ${(result.citations || []).join(", ")}
      </div>

      ${
        result.revocation_flag
          ? `<div style="margin-top:10px;"><strong>Revocation Action:</strong><pre>${JSON.stringify(result.revocation_action, null, 2)}</pre></div>`
          : ""
      }
    `;

  } catch (err) {
    container.innerHTML = `<p>Error: ${err.message}</p>`;
  }
}

runCopilot();

</script>

</body>
</html>
