<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>STC Copilot</title>
  <link rel="stylesheet" href="/css/shield.css" />
</head>

<body>

<header class="nav">
  <div class="nav-inner">
    <strong>STC Copilot</strong>

    <nav>
      <a href="/shield/">Shield</a>
      <a href="/riskdna/">RiskDNA</a>
    </nav>
  </div>
</header>

<main class="container">

  <h1>Copilot Intelligence</h1>
  <p class="muted">Deterministic explanation of runtime decisions</p>

  <div class="card" id="copilot-output">
    <p class="muted">Analyzing decision...</p>
  </div>

</main>

<script>
async function runCopilot() {
  const data = JSON.parse(localStorage.getItem("lastDecision"));

  if (!data) {
    document.getElementById("copilot-output").innerHTML =
      "<p>No decision data available</p>";
    return;
  }

  try {
    const res = await fetch("https://copilot-engine.fly.dev/ask/explain", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        question: "Explain this decision",
        context: data,
        mode: "copilot"
      })
    });

    const result = await res.json();

    document.getElementById("copilot-output").innerHTML = `
      <h3>Copilot Response</h3>
      <p>${result.answer || "No explanation returned"}</p>
    `;

  } catch (err) {
    document.getElementById("copilot-output").innerHTML =
      `<p>Error: ${err.message}</p>`;
  }
}

runCopilot();
</script>

</body>
</html>
